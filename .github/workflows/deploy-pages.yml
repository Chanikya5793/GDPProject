name: Deploy to GitHub Pages

# Builds the Vite app and publishes the static output to the `gh-pages`
# branch. Runs for the feature branch so the changes can be previewed,
# and can also be triggered manually from the Actions tab.
on:
  push:
    branches:
      - claude/github-issues-triage-bOYA6
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Disable Jekyll so files/folders starting with `_` are served as-is
          enable_jekyll: false
